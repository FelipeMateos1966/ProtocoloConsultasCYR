<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo de Resolución de Consultas</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Scripts Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.12.16/dist/framer-motion.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        enterprise: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            600: '#2563eb',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        body {
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
            overflow-x: hidden;
        }
        
        .node-connector::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 24px;
            width: 20px;
            height: 2px;
            border-top: 2px dashed #cbd5e1;
        }

        .vertical-line {
            position: absolute;
            left: 11px;
            top: 40px;
            bottom: 20px;
            width: 2px;
            border-left: 2px dashed #cbd5e1;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; background-image: none !important; }
            .print-full { width: 100% !important; margin: 0 !important; padding: 0 !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        const PROTOCOLO_DATA = {
            id: 'root',
            title: 'Protocolo de Resolución de Consultas',
            emoji: '🏢',
            color: '#1e3a8a',
            description: 'Flujo maestro para la gestión de consultas técnicas y estandarización del criterio.',
            details: [
                'Estandarización de respuestas corporativas',
                'Protección ante responsabilidad civil profesional',
                'Escalabilidad del conocimiento compartido'
            ],
            children: [
                {
                    id: 'fase1',
                    title: '1. Recepción y Clasificación',
                    emoji: '📥',
                    color: '#3b82f6',
                    description: 'Filtro administrativo inicial para asegurar la viabilidad del análisis.',
                    details: [
                        'Verificación de datos mínimos (Cliente, Fecha, Operación)',
                        'Detección de información incompleta o ambigua',
                        { text: 'Acceso a Consultas por Área (IAs)', url: 'https://consultorescyr.sharepoint.com/sites/ConsultasCYR/Lists/IAs/Consultas%20por%20rea.aspx' },
                        'Asignación del nivel de riesgo inicial'
                    ],
                    children: [
                        {
                            id: 'fase1-1',
                            title: 'Verificación de Datos',
                            emoji: '🔍',
                            color: '#60a5fa',
                            description: 'Garantizar que no se emite criterio sobre supuestos hechos inciertos.',
                            details: [
                                'Solicitud formal de ampliación de hechos',
                                'Bloqueo del análisis técnico hasta completar el expediente'
                            ]
                        }
                    ]
                },
                {
                    id: 'fase2',
                    title: '2. Búsqueda Interna',
                    emoji: '🧠',
                    color: '#8b5cf6',
                    description: 'Consulta obligatoria al "Criterio Fiscal Interno" antes de investigar fuera.',
                    details: [
                        'Consulta en Base de Datos SharePoint (Listas)',
                        { text: 'Verificación en Consultas por Área (IAs)', url: 'https://consultorescyr.sharepoint.com/sites/ConsultasCYR/Lists/IAs/Consultas%20por%20rea.aspx' },
                        'Verificación de vigencia del criterio almacenado',
                        'Adaptación de plantillas de respuesta existentes'
                    ],
                    children: [
                        {
                            id: 'fase2-1',
                            title: 'Investigación Normativa',
                            emoji: '📚',
                            color: '#a78bfa',
                            description: 'Análisis profundo si no existe un precedente interno válido.',
                            details: [
                                'Ley y Reglamento aplicable',
                                'Búsqueda en Consultas Vinculantes DGT',
                                'Doctrina AEAT (Manuales e INFORMA)',
                                'Jurisprudencia de tribunales superiores'
                            ]
                        }
                    ]
                },
                {
                    id: 'fase3',
                    title: '3. Validación y Cierre',
                    emoji: '✅',
                    color: '#10b981',
                    description: 'Control de calidad final y actualización del conocimiento.',
                    details: [
                        'Nota interna con hechos, norma y riesgo',
                        'Validación obligatoria por responsable de área',
                        'Redacción en plantilla oficial sin ambigüedades',
                        'Registro del nuevo criterio en el sistema central'
                    ]
                }
            ]
        };

        const Node = ({ node, isLast, selectedId, onSelect, forceExpand, forceCollapse }) => {
            const [isOpen, setIsOpen] = useState(true);
            const hasChildren = node.children && node.children.length > 0;

            useEffect(() => {
                if (forceExpand) setIsOpen(true);
            }, [forceExpand]);

            useEffect(() => {
                if (forceCollapse) setIsOpen(false);
            }, [forceCollapse]);

            return (
                <div className="relative ml-8 mt-4">
                    {!isLast && hasChildren && isOpen && <div className="vertical-line"></div>}
                    
                    <motion.div 
                        initial={{ opacity: 0, x: -10 }}
                        animate={{ opacity: 1, x: 0 }}
                        className={`
                            relative flex items-center p-3 mb-2 rounded-2xl border bg-white shadow-sm cursor-pointer transition-all
                            ${selectedId === node.id ? 'ring-2 ring-blue-500 shadow-md translate-x-1 border-blue-200' : 'hover:shadow-md border-slate-200'}
                        `}
                        style={{ borderLeft: `6px solid ${node.color}` }}
                        onClick={(e) => {
                            e.stopPropagation();
                            onSelect(node);
                        }}
                    >
                        <div className="flex items-center gap-3 w-full">
                            {hasChildren && (
                                <button 
                                    onClick={(e) => {
                                        e.stopPropagation();
                                        setIsOpen(!isOpen);
                                    }}
                                    className="text-slate-400 hover:text-blue-600 transition-transform duration-200 w-4"
                                    style={{ transform: isOpen ? 'rotate(90deg)' : 'rotate(0deg)' }}
                                >
                                    <i className="fas fa-chevron-right text-[10px]"></i>
                                </button>
                            )}
                            {!hasChildren && <div className="w-4"></div>}
                            <span className="text-xl leading-none">{node.emoji}</span>
                            <span className="font-semibold text-slate-700 text-sm md:text-base truncate">{node.title}</span>
                        </div>
                    </motion.div>

                    <AnimatePresence>
                        {isOpen && hasChildren && (
                            <motion.div 
                                initial={{ opacity: 0, height: 0 }}
                                animate={{ opacity: 1, height: 'auto' }}
                                exit={{ opacity: 0, height: 0 }}
                                className="overflow-hidden"
                            >
                                {node.children.map((child, index) => (
                                    <div key={child.id} className="node-connector relative">
                                        <Node 
                                            node={child} 
                                            isLast={index === node.children.length - 1}
                                            selectedId={selectedId}
                                            onSelect={onSelect}
                                            forceExpand={forceExpand}
                                            forceCollapse={forceCollapse}
                                        />
                                    </div>
                                ))}
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const App = () => {
            const [selectedNode, setSelectedNode] = useState(PROTOCOLO_DATA);
            const [forceExpand, setForceExpand] = useState(0);
            const [forceCollapse, setForceCollapse] = useState(0);

            const handleExpandAll = () => setForceExpand(prev => prev + 1);
            const handleCollapseAll = () => setForceCollapse(prev => prev + 1);

            return (
                <div className="min-h-screen flex flex-col md:flex-row font-sans text-slate-900">
                    {/* Main Workspace */}
                    <div className={`flex-1 transition-all duration-300 p-4 md:p-10 ${selectedNode ? 'md:mr-96' : ''} print-full`}>
                        <div className="max-w-4xl mx-auto">
                            <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 no-print gap-6 border-b border-slate-200 pb-8">
                                <div className="flex items-center gap-5">
                                    <img 
                                        src="https://i.postimg.cc/k403GWP5/cyr.jpg" 
                                        alt="Consultores CYR" 
                                        className="h-14 w-14 rounded-xl object-contain p-1 bg-white shadow-sm border border-slate-100"
                                    />
                                    <div>
                                        <h1 className="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight leading-tight">Protocolo de Resolución de Consultas</h1>
                                        <p className="text-slate-500 font-medium text-sm md:text-base">De la consulta a la respuesta validada, paso a paso.</p>
                                    </div>
                                </div>
                                <div className="flex gap-2 w-full md:w-auto overflow-x-auto pb-2">
                                    <button 
                                        onClick={handleExpandAll}
                                        className="whitespace-nowrap px-4 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 hover:border-blue-300 hover:text-blue-600 transition-all flex items-center shadow-sm"
                                    >
                                        <i className="fas fa-expand-alt mr-2"></i> EXPANDIR
                                    </button>
                                    <button 
                                        onClick={handleCollapseAll}
                                        className="whitespace-nowrap px-4 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 hover:border-blue-300 hover:text-blue-600 transition-all flex items-center shadow-sm"
                                    >
                                        <i className="fas fa-compress-alt mr-2"></i> COLAPSAR
                                    </button>
                                </div>
                            </header>

                            <div className="relative pt-4">
                                <Node 
                                    node={PROTOCOLO_DATA} 
                                    isLast={true}
                                    selectedId={selectedNode?.id}
                                    onSelect={setSelectedNode}
                                    forceExpand={forceExpand}
                                    forceCollapse={forceCollapse}
                                />
                            </div>
                        </div>
                    </div>

                    {/* Side Persistence Panel */}
                    <AnimatePresence mode="wait">
                        {selectedNode && (
                            <motion.aside 
                                key={selectedNode.id}
                                initial={{ x: 400, opacity: 0 }}
                                animate={{ x: 0, opacity: 1 }}
                                exit={{ x: 400, opacity: 0 }}
                                transition={{ type: 'spring', damping: 25, stiffness: 200 }}
                                className="fixed right-0 top-0 bottom-0 w-full md:w-96 bg-white border-l border-slate-200 shadow-[-10px_0_30px_rgba(0,0,0,0.05)] z-40 flex flex-col no-print"
                            >
                                <div className="p-8 overflow-y-auto hide-scrollbar h-full flex flex-col">
                                    <div className="flex justify-between items-start mb-8">
                                        <div 
                                            className="w-16 h-16 rounded-2xl flex items-center justify-center text-4xl shadow-inner mb-4"
                                            style={{ backgroundColor: `${selectedNode.color}15`, border: `1.5px solid ${selectedNode.color}40` }}
                                        >
                                            {selectedNode.emoji}
                                        </div>
                                        <button 
                                            onClick={() => setSelectedNode(null)}
                                            className="text-slate-300 hover:text-slate-600 p-2 transition-colors"
                                        >
                                            <i className="fas fa-times text-lg"></i>
                                        </button>
                                    </div>

                                    <h2 className="text-2xl font-bold text-slate-800 mb-3 tracking-tight leading-tight">{selectedNode.title}</h2>
                                    <div className="h-1 w-12 rounded-full mb-6" style={{ backgroundColor: selectedNode.color }}></div>
                                    
                                    <p className="text-slate-500 italic mb-8 leading-relaxed text-sm">
                                        "{selectedNode.description}"
                                    </p>

                                    <div className="space-y-8 flex-1">
                                        <div>
                                            <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-5">Procedimiento Clave</h3>
                                            <div className="space-y-4">
                                                {selectedNode.details.map((detail, idx) => (
                                                    <motion.div 
                                                        key={idx} 
                                                        initial={{ opacity: 0, y: 10 }}
                                                        animate={{ opacity: 1, y: 0 }}
                                                        transition={{ delay: idx * 0.1 }}
                                                        className="flex gap-4 group"
                                                    >
                                                        <div className="flex-shrink-0 w-6 h-6 rounded-lg bg-slate-50 border border-slate-100 flex items-center justify-center text-[10px] font-bold text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-500 transition-colors">
                                                            {idx + 1}
                                                        </div>
                                                        <div className="text-sm text-slate-600 font-medium leading-snug">
                                                            {typeof detail === 'string' ? (
                                                                detail
                                                            ) : (
                                                                <a 
                                                                    href={detail.url} 
                                                                    target="_blank" 
                                                                    rel="noopener noreferrer"
                                                                    className="text-blue-600 hover:text-blue-800 underline flex items-center gap-1 transition-colors font-bold"
                                                                >
                                                                    {detail.text}
                                                                    <i className="fas fa-external-link-alt text-[10px]"></i>
                                                                </a>
                                                            )}
                                                        </div>
                                                    </motion.div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-8 pt-6 border-t border-slate-100">
                                        <div className="p-5 bg-slate-50 rounded-2xl border border-slate-100">
                                            <div className="flex items-center gap-2 text-slate-800 font-bold text-[10px] uppercase tracking-wider mb-2">
                                                <i className="fas fa-shield-halved text-blue-500"></i> Garantía de Calidad
                                            </div>
                                            <p className="text-[11px] text-slate-500 leading-normal">
                                                Todo criterio debe ser contrastado con la base de SharePoint. Si el riesgo es <b>alto</b>, requiere firma del Socio.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </motion.aside>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>

</html>
